<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100..700&family=Noto+Sans+Thai:wght@100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
        <title>Form</title>
</head>
<body>
    <form action="/validation" method="GET" class="form">
        <div class="field">
            <label for="username">Username or Email</label>
            <input id="username" name="username" type="text" placeholder="Enter your username or email">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" placeholder="Enter your password">
        </div>
        <div class="field field-submit">
            <button type="submit">Sign-in</button>
        </div>
    </form>
</body>
</html>
