<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@100..700&family=Noto+Sans+Thai:wght@100..900&family=Zalando+Sans:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <title>Form</title>
</head>
<body>
    <div class="page">
        <h1>Users Form</h1>
        <form action="/formget" method="GET" class="user-form">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password">
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="e.g. name@example.com">
            </div>
            <div class="field">
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname" placeholder="First name">
            </div>
            <div class="field">
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" placeholder="Last name">
            </div>
            <div class="field">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" placeholder="Age" min="0">
            </div>
            <div class="field">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Address">
            </div>
            <div class="field">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" placeholder="Phone number">
            </div>
            <div class="field field-submit">
                <button type="submit">Submit</button>
            </div>
        </form>
        <nav class="links">
            <a href="/">Back</a>
            <a href="/showdata">Show Data</a>
        </nav>
    </div>
</body>
</html>
